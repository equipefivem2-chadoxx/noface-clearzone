<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Tracker - Premium RP</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: #121212; color: #fff; }
        
        #sidebar { width: 320px; background-color: #1a1a1a; padding: 25px; border-right: 2px solid #bda581; display: flex; flex-direction: column; gap: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); z-index: 10; }
        h1 { color: #bda581; font-size: 22px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        
        label { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; padding: 12px; margin-top: 8px; background-color: #242424; border: 1px solid #333; color: white; border-radius: 4px; outline: none; transition: 0.2s; }
        select:focus, input:focus { border-color: #bda581; }
        
        .btn { background-color: #bda581; color: #121212; border: none; padding: 14px; font-weight: bold; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: 0.3s; margin-top: 15px; letter-spacing: 1px; }
        .btn:hover { background-color: #a8906e; transform: translateY(-2px); }
        
        #map-container { flex-grow: 1; position: relative; overflow: hidden; background-color: #0a0a0a; }
        /* L'image de fond actuelle est une couleur unie en attendant que tu glisses ta map de Los Santos */
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; background-color: #1e1e1e; background-size: cover; background-position: center; }
        
        #status { font-size: 12px; color: #bda581; text-align: center; margin-top: auto; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>Dispatch Server</h1>
        
        <div>
            <label>Département</label>
            <select id="faction">
                <option value="LSPD">LSPD</option>
                <option value="BCSO">BCSO</option>
                <option value="SASP">SASP</option>
            </select>
        </div>

        <div>
            <label>Indicatif (ex: A141)</label>
            <input type="text" id="unitName" placeholder="Entrez votre indicatif...">
        </div>

        <div>
            <label>Couleur du Surligneur</label>
            <input type="color" id="fluoColor" value="#bda581">
        </div>

        <button class="btn" id="clearBtn">Nettoyer la carte</button>
        <p id="status">Connexion en cours...</p>
    </div>

    <div id="map-container">
        <canvas id="mapCanvas"></canvas>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');

        function resizeCanvas() {
            canvas.width = document.getElementById('map-container').clientWidth;
            canvas.height = document.getElementById('map-container').clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let drawing = false;
        let current = { x: 0, y: 0 };

        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.lineWidth = 12;

        socket.on('connect', () => { statusText.innerText = "Connecté - Temps réel actif"; });

        socket.on('load_history', (history) => {
            history.forEach(data => drawLine(data.x0, data.y0, data.x1, data.y1, data.color, false));
        });

        socket.on('draw', (data) => {
            drawLine(data.x0, data.y0, data.x1, data.y1, data.color, false);
        });

        socket.on('clear_map', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            socket.emit('clear_map');
        });

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            current.x = e.offsetX;
            current.y = e.offsetY;
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!drawing) return;
            drawing = false;
            drawLine(current.x, current.y, e.offsetX, e.offsetY, document.getElementById('fluoColor').value, true);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            drawLine(current.x, current.y, e.offsetX, e.offsetY, document.getElementById('fluoColor').value, true);
            current.x = e.offsetX;
            current.y = e.offsetY;
        });

        function drawLine(x0, y0, x1, y1, color, emit) {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            
            let r = parseInt(color.slice(1, 3), 16),
                g = parseInt(color.slice(3, 5), 16),
                b = parseInt(color.slice(5, 7), 16);
            ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.5)`;
            
            ctx.stroke();
            ctx.closePath();

            if (!emit) return;
            socket.emit('draw', { x0, y0, x1, y1, color });
        }
    </script>
</body>
</html>
