<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Tracker - MDT Portal</title>
    
    <!-- Polices et Icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        :root {
            --primary: #bda581;
            --primary-bright: #d8c3a5;
            --primary-glow: rgba(189, 165, 129, 0.3);
            --bg-dark: #07090e;
            --bg-card: rgba(15, 23, 42, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            display: flex; 
            height: 100vh; 
            background-color: var(--bg-dark); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }
        
        /* Barre latérale effet Glassmorphism premium */
        #sidebar { 
            width: 350px; 
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(189, 165, 129, 0.25);
            padding: 30px 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.8); 
            z-index: 10; 
            position: relative;
        }

        /* Ligne de décoration en haut de la sidebar */
        .sidebar-decoration-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .sidebar-title {
            font-size: 26px;
            font-weight: 900;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        .sidebar-title span {
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-subtitle {
            font-family: monospace;
            color: var(--primary);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 0.8;
            margin-top: -15px;
            margin-bottom: 10px;
        }

        .sidebar-subtitle::before, .sidebar-subtitle::after {
            content: '///';
            color: rgba(189, 165, 129, 0.4);
            letter-spacing: -1px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label { 
            font-size: 12px; 
            color: var(--primary-bright); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Inputs stylisés */
        select, input { 
            width: 100%; 
            padding: 14px; 
            background-color: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(189, 165, 129, 0.2); 
            color: white; 
            border-radius: 6px; 
            outline: none; 
            transition: all 0.3s ease; 
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
        }
        
        select:focus, input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 15px rgba(189, 165, 129, 0.15);
            background-color: rgba(0, 0, 0, 0.6);
        }

        input[type="color"] {
            height: 50px;
            padding: 5px;
            cursor: pointer;
        }
        
        /* Bouton dynamique */
        .action-btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(189, 165, 129, 0.08); 
            border: 1px solid var(--primary); 
            color: var(--primary-bright); 
            padding: 16px; 
            font-weight: 700; 
            text-transform: uppercase; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            margin-top: auto; 
            letter-spacing: 1px; 
            font-size: 13px;
        }
        
        .action-btn:hover { 
            background: var(--primary); 
            color: var(--bg-dark); 
            box-shadow: 0 0 20px var(--primary-glow); 
            transform: translateY(-2px); 
        }

        .action-btn:hover i {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px) rotate(-5deg); }
            75% { transform: translateX(2px) rotate(5deg); }
        }
        
        /* Zone de la carte avec grille holographique */
        #map-container { 
            flex-grow: 1; 
            position: relative; 
            overflow: hidden; 
            background-color: var(--bg-dark); 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(189, 165, 129, 0.05), transparent 70%),
                linear-gradient(rgba(189, 165, 129, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(189, 165, 129, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            cursor: crosshair; 
            /* Remplacer URL par ta carte */
            background-image: url(''); 
            background-size: cover; 
            background-position: center; 
        }
        
        #status { 
            font-size: 11px; 
            color: var(--primary); 
            text-align: center; 
            opacity: 0.6; 
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-decoration-top"></div>
        
        <div>
            <h2 class="sidebar-title">DISPATCH <span>MAP</span></h2>
            <div class="sidebar-subtitle">Tac-Map Fédérale</div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-building-shield"></i> Département</label>
            <select id="faction">
                <option value="LSPD">LSPD (Los Santos Police)</option>
                <option value="BCSO">BCSO (Blaine County)</option>
                <option value="SASP">SASP (Joint Force)</option>
            </select>
        </div>

        <div class="input-group">
            <label><i class="fas fa-walkie-talkie"></i> Indicatif Unité</label>
            <input type="text" id="unitName" placeholder="Ex: A141 - 167">
        </div>

        <div class="input-group">
            <label><i class="fas fa-highlighter"></i> Traceur Tactique (Fluo)</label>
            <input type="color" id="fluoColor" value="#bda581">
        </div>

        <button class="action-btn" id="clearBtn">
            <i class="fas fa-trash-alt"></i> Purger la zone
        </button>
        <p id="status"><i class="fas fa-satellite-dish"></i> Initialisation...</p>
    </div>

    <div id="map-container">
        <canvas id="mapCanvas"></canvas>
    </div>

    <script>
        // --------------------------------------------------------
        // 1. AUTO-SÉLECTION DE LA FACTION DEPUIS LA PAGE D'ACCUEIL
        // --------------------------------------------------------
        const urlParams = new URLSearchParams(window.location.search);
        const factionParam = urlParams.get('faction');
        if (factionParam) {
            const select = document.getElementById('faction');
            if(select.querySelector(`option[value="${factionParam}"]`)) {
                select.value = factionParam;
            }
        }

        // --------------------------------------------------------
        // 2. LOGIQUE DU TEMPS RÉEL (SOCKET.IO) ET DESSIN
        // --------------------------------------------------------
        const socket = io();
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');

        function resizeCanvas() {
            canvas.width = document.getElementById('map-container').clientWidth;
            canvas.height = document.getElementById('map-container').clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let drawing = false;
        let current = { x: 0, y: 0 };

        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.lineWidth = 14;

        socket.on('connect', () => { 
            statusText.innerHTML = '<i class="fas fa-satellite-dish"></i> Liaison uplink établie'; 
            statusText.style.opacity = '1';
        });

        socket.on('load_history', (history) => {
            history.forEach(data => drawLine(data.x0, data.y0, data.x1, data.y1, data.color, false));
        });

        socket.on('draw', (data) => {
            drawLine(data.x0, data.y0, data.x1, data.y1, data.color, false);
        });

        socket.on('clear_map', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            socket.emit('clear_map');
        });

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            current.x = e.offsetX;
            current.y = e.offsetY;
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!drawing) return;
            drawing = false;
            drawLine(current.x, current.y, e.offsetX, e.offsetY, document.getElementById('fluoColor').value, true);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            drawLine(current.x, current.y, e.offsetX, e.offsetY, document.getElementById('fluoColor').value, true);
            current.x = e.offsetX;
            current.y = e.offsetY;
        });

        function drawLine(x0, y0, x1, y1, color, emit) {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            
            let r = parseInt(color.slice(1, 3), 16),
                g = parseInt(color.slice(3, 5), 16),
                b = parseInt(color.slice(5, 7), 16);
            ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.6)`;
            
            ctx.stroke();
            ctx.closePath();

            if (!emit) return;
            socket.emit('draw', { x0, y0, x1, y1, color });
        }
    </script>
</body>
</html>
