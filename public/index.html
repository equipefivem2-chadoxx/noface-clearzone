<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDT - Tactique</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #bda581;
            --bg-sidebar: #0b0e14;
            --bg-dark: #07090e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--bg-dark); color: #fff; overflow: hidden; }
        
        /* Panel Latéral Épuré */
        #sidebar {
            width: 340px; background-color: var(--bg-sidebar);
            padding: 40px 30px; display: flex; flex-direction: column; gap: 30px;
            border-right: 1px solid rgba(189, 165, 129, 0.15); box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            z-index: 5;
        }
        h2 { font-size: 20px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
        h2 span { color: var(--primary); }
        
        .field { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; font-weight: 700; }
        
        input, select {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(189, 165, 129, 0.2); color: #fff;
            border-radius: 6px; font-size: 14px; outline: none; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        
        input[type="color"] { height: 45px; padding: 5px; cursor: pointer; }

        .btn-clear {
            background: transparent; border: 1px solid #ff4444; color: #ff4444;
            padding: 14px; font-weight: 700; border-radius: 6px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; font-size: 12px;
            transition: 0.3s; margin-top: auto;
        }
        .btn-clear:hover { background: #ff4444; color: #fff; box-shadow: 0 0 15px rgba(255, 68, 68, 0.3); }

        /* Conteneur de la carte */
        #map-container { flex-grow: 1; position: relative; background-color: var(--bg-dark); }
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>DISPATCH <span>MAP</span></h2>
        
        <div class="field">
            <label>Département Enregistré</label>
            <select id="faction">
                <option value="LSPD">LSPD (Los Santos Police)</option>
                <option value="BCSO">BCSO (Blaine County)</option>
                <option value="SASP">SASP (Joint Force)</option>
            </select>
        </div>

        <div class="field">
            <label>Création d'unité (Indicatif)</label>
            <input type="text" id="unitName" placeholder="Ex: A141 - 167">
        </div>

        <div class="field">
            <label>Couleur du Marqueur (Fluo)</label>
            <input type="color" id="fluoColor" value="#bda581">
        </div>

        <button class="btn-clear" id="clearBtn">Purger la carte</button>
    </div>

    <div id="map-container">
        <canvas id="mapCanvas"></canvas>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const factionParam = urlParams.get('faction');
        if (factionParam) document.getElementById('faction').value = factionParam;

        const socket = io();
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = document.getElementById('map-container').clientWidth;
            canvas.height = document.getElementById('map-container').clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Configuration pour éviter l'effet haché de l'image_06eba7.jpg
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.lineWidth = 12;

        socket.on('load_history', (history) => {
            history.forEach(data => drawLine(data.x0, data.y0, data.x1, data.y1, data.color, false));
        });

        socket.on('draw', (data) => {
            drawLine(data.x0, data.y0, data.x1, data.y1, data.color, false);
        });

        socket.on('clear_map', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); });

        document.getElementById('clearBtn').addEventListener('click', () => { socket.emit('clear_map'); });

        // Événements de la souris modifiés pour un tracé continu parfait
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const color = document.getElementById('fluoColor').value;
            drawLine(lastX, lastY, e.offsetX, e.offsetY, color, true);
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseout', () => isDrawing = false);

        function drawLine(x0, y0, x1, y1, color, emit) {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            
            let r = parseInt(color.slice(1, 3), 16),
                g = parseInt(color.slice(3, 5), 16),
                b = parseInt(color.slice(5, 7), 16);
            ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, 0.5)`; // Rendu fluo transparent
            
            ctx.stroke();
            ctx.closePath();

            if (!emit) return;
            socket.emit('draw', { x0, y0, x1, y1, color });
        }
    </script>
</body>
</html>
