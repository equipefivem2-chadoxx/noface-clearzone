<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDT - Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #bda581;
            --bg-dark: #07090e;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, rgba(189, 165, 129, 0.08), transparent 70%);
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: #fff;
        }
        .container {
            display: flex; flex-direction: column; gap: 20px;
            width: 100%; max-width: 400px; text-align: center;
        }
        h1 {
            font-size: 28px; font-weight: 900; letter-spacing: 4px;
            color: #fff; text-transform: uppercase; margin-bottom: 30px;
        }
        h1 span { color: var(--primary); }
        .btn {
            background: rgba(189, 165, 129, 0.05);
            border: 1px solid rgba(189, 165, 129, 0.3);
            color: #fff; padding: 20px; font-weight: 700;
            font-size: 16px; letter-spacing: 2px; text-transform: uppercase;
            border-radius: 8px; cursor: pointer; transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--primary); color: var(--bg-dark);
            box-shadow: 0 0 25px rgba(189, 165, 129, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MDT <span>SYSTEM</span></h1>
        <button class="btn" onclick="select('LSPD')">LSPD</button>
        <button class="btn" onclick="select('BCSO')">BCSO</button>
        <button class="btn" onclick="select('SASP')">LES DEUX (SASP)</button>
    </div>

    <script>
        function select(faction) {
            window.location.href = '/index.html?faction=' + faction;
        }
    </script>
</body>
</html>
